[phases.setup]
nixPkgs = ["php82", "php82Extensions.mbstring", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.curl", "php82Extensions.xml", "nodejs_20"]

[phases.install]
cmds = ["composer install --no-dev", "npm install"]

[phases.build]
cmds = ["npm run build", "php artisan config:cache"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"